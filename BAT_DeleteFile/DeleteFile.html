<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>DeleteFile.bat</title>
</head>
<body>

<pre id="code">読み込み中...</pre>

<script>
fetch("DeleteFile.bat")
  .then(res => res.arrayBuffer())
  .then(buf => {
    const decoder = new TextDecoder("shift_jis");
    document.getElementById("code").textContent =
      decoder.decode(buf);
  });
</script>

</body>
</html>
