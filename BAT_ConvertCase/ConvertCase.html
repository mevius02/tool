<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Text Viewer</title>
<style>
body { font-family: monospace; white-space: pre; }
</style>
</head>
<body>

<div id="code">loading...</div>

<script>
fetch("ConvertCase.bat")
  .then(res => res.arrayBuffer())
  .then(buf => {
    const uint = new Uint8Array(buf);

    // UTF-8判定
    function isUTF8(bytes) {
      let i = 0;
      while (i < bytes.length) {
        if (bytes[i] <= 0x7F) { i++; continue; }
        else if ((bytes[i] & 0xE0) === 0xC0) i += 2;
        else if ((bytes[i] & 0xF0) === 0xE0) i += 3;
        else if ((bytes[i] & 0xF8) === 0xF0) i += 4;
        else return false;
      }
      return true;
    }

    let text;
    if (isUTF8(uint)) {
      text = new TextDecoder("utf-8").decode(buf);
    } else {
      text = new TextDecoder("shift_jis").decode(buf);
    }

    document.getElementById("code").textContent = text;
  });
</script>

</body>
</html>
